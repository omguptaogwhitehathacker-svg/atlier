<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atelier — Cream Minimalist E‑Commerce (v4)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root {
      --cream: #FDFDF2;
      --cream-warm: #F8F6F0;
      --charcoal: #1a1a1a;
      --text-secondary: #555;
      --text-muted: #888;
      --border: #e8e4dc;
      --border-light: #f0ece4;
      --accent: #b8936e;
      --danger: #c4665a;
      --success: #5a8a5a;
    }
    body {
      background-color: var(--cream);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--charcoal);
      overflow-x: hidden;
    }
    #bg-canvas {
      position: fixed; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events: none; opacity:0.25;
    }
    .main-content { position:relative; z-index:10; }
    .hero-title { transition: text-shadow 0.1s ease; cursor:default; }
    .btn-charcoal { background:var(--charcoal); color:white; border-radius:9999px; padding:0.7rem 2rem; font-weight:500; letter-spacing:0.5px; transition:0.2s; border:none; cursor:pointer; }
    .btn-charcoal:hover { background:#2c2c2c; transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,0,0,0.12); }
    .card-hover { transition:0.25s; }
    .card-hover:hover { transform:translateY(-4px); box-shadow:0 16px 32px rgba(0,0,0,0.08); }
    .drawer { transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .drawer.open { transform:translateX(0); }
    .modal-overlay { opacity:0; pointer-events:none; transition:opacity 0.2s; }
    .modal-overlay.active { opacity:1; pointer-events:all; }
    .product-card { opacity:0; transform:translateY(28px); transition:opacity 0.5s ease, transform 0.5s ease; }
    .product-card.visible { opacity:1; transform:translateY(0); }
    input, select, textarea { background:white; border:1px solid var(--border); border-radius:6px; padding:0.6rem 0.9rem; font-size:0.9rem; transition:border 0.2s; }
    input:focus, select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(184,147,110,0.1); }
    table th { font-weight:600; text-transform:uppercase; letter-spacing:0.5px; font-size:0.7rem; color:var(--text-secondary); }
    .status-badge { padding:2px 8px; border-radius:9999px; font-size:0.65rem; font-weight:600; text-transform:uppercase; }
    .status-pending{background:#fff3d6;color:#8b6d20} .status-processing{background:#d6eaff;color:#20558b} .status-shipped{background:#d6f0d6;color:#2e6b2e} .status-delivered{background:#e0d6f0;color:#4e2e6b} .status-cancelled{background:#fce4e4;color:#a04040}
    .star { color:#c49a45; font-size:1.2rem; }
    .star.empty { color:#ddd; }
  </style>
</head>
<body class="min-h-screen">
  <canvas id="bg-canvas"></canvas>
  <div id="app-root" class="main-content relative z-10 min-h-screen flex flex-col">

    <!-- ========== STOREFRONT ========== -->
    <div id="view-storefront" class="flex-1">
      <header class="sticky top-0 z-50 bg-[#FDFDF2]/90 backdrop-blur-sm border-b border-[#f0ece4] px-6 py-3 flex items-center justify-between flex-wrap gap-3">
        <div class="text-2xl font-serif tracking-widest cursor-pointer" id="logo-home">Atelier<span class="text-[#7d5d3f]">.</span>Cream</div>
        <nav class="flex items-center gap-4 text-sm font-medium text-gray-600 flex-wrap">
          <a class="cursor-pointer hover:text-black transition" id="nav-shop">Shop</a>
          <a class="cursor-pointer hover:text-black transition" id="nav-orders">My Orders</a>
          <button class="bg-black text-white px-4 py-1.5 rounded-full text-xs tracking-wide flex items-center gap-1 hover:bg-gray-800 transition" id="btn-cart-badge">🛒 Cart (<span id="cart-count-badge">0</span>)</button>
          <button class="border border-gray-300 px-3 py-1.5 rounded-full text-xs tracking-wide hover:bg-black hover:text-white transition" id="btn-user-menu">Sign In</button>
          <button class="border border-gray-300 px-3 py-1.5 rounded-full text-xs tracking-wide hover:bg-black hover:text-white transition" id="btn-admin-switch">Admin</button>
        </nav>
      </header>
      <main id="store-content-area" class="max-w-7xl mx-auto px-4 sm:px-6 pb-16"></main>
    </div>

    <!-- ========== ADMIN PANEL ========== -->
    <div id="view-admin" class="hidden flex-1">
      <header class="sticky top-0 z-50 bg-[#FDFDF2]/90 backdrop-blur-sm border-b border-[#f0ece4] px-6 py-3 flex items-center justify-between flex-wrap gap-3">
        <div class="text-xl font-serif tracking-widest cursor-pointer" id="admin-logo-home">Atelier<span class="text-[#7d5d3f]">.</span>Cream <span class="text-xs text-gray-400">Admin</span></div>
        <div class="flex items-center gap-3 flex-wrap">
          <span id="admin-user-name" class="text-sm"></span>
          <span class="text-xs font-bold uppercase px-2 py-0.5 rounded-full" id="admin-role-badge"></span>
          <button class="border px-3 py-1 rounded-full text-xs hover:bg-black hover:text-white transition" id="btn-admin-logout">Logout</button>
          <button class="border px-3 py-1 rounded-full text-xs hover:bg-black hover:text-white transition" id="btn-admin-to-store">← Store</button>
        </div>
      </header>
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4">
        <div class="flex gap-2 flex-wrap mb-6" id="admin-sidebar"></div>
        <div class="bg-white border border-[#f0ece4] rounded-2xl p-6 min-h-[400px]" id="admin-content-panel"></div>
      </div>
    </div>
  </div>

  <!-- Cart Drawer -->
  <div class="fixed inset-0 bg-black/30 z-[100] hidden" id="cart-overlay"></div>
  <div class="fixed top-0 right-0 h-full w-full max-w-md bg-[#FDFDF2] z-[110] shadow-2xl drawer border-l border-[#f0ece4] flex flex-col" id="cart-drawer">
    <div class="flex items-center justify-between px-5 py-4 border-b border-[#f0ece4]"><h3 class="text-lg font-serif tracking-wide">Your Cart</h3><button id="btn-close-cart" class="text-2xl leading-none hover:text-gray-500">&times;</button></div>
    <div class="flex-1 overflow-y-auto px-5 py-4 space-y-4" id="cart-drawer-body"></div>
    <div class="px-5 py-4 border-t border-[#f0ece4]" id="cart-drawer-footer"></div>
  </div>

  <!-- Auth Modal -->
  <div class="fixed inset-0 bg-black/40 z-[120] flex items-center justify-center modal-overlay" id="auth-modal-overlay"><div class="bg-[#FDFDF2] rounded-2xl p-6 w-full max-w-md mx-4 shadow-xl relative" id="auth-modal-dialog"></div></div>
  <!-- Generic Modal -->
  <div class="fixed inset-0 bg-black/40 z-[120] flex items-center justify-center modal-overlay" id="generic-modal-overlay"><div class="bg-[#FDFDF2] rounded-2xl p-6 w-full max-w-lg mx-4 shadow-xl relative max-h-[90vh] overflow-y-auto" id="generic-modal-dialog"></div></div>
  <!-- Toast -->
  <div id="toast-container" class="fixed bottom-5 right-5 z-[200] flex flex-col gap-2"></div>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    // ==================== DATABASE ====================
    const DB_KEY = 'atelier_cream_v4_db';
    function getDB() {
      let raw = localStorage.getItem(DB_KEY);
      if (!raw) {
        const defaultDB = {
          categories: ['Electronics','Fashion','Home & Living','Kitchen','Beauty & Wellness','Accessories'],
          products: [],
          orders: [],
          archivedProducts: [],
          restockLog: [],
          nextProductId: 1,
          nextOrderId: 1,
          users: [
            { id:1, name:'Owner', email:'owner@admin.com', password:'password123', role:'owner' },
            { id:2, name:'Admin Manager', email:'admin@admin.com', password:'password123', role:'admin' },
            { id:3, name:'Staff Member', email:'staff@admin.com', password:'password123', role:'staff' }
          ],
          consumerUsers: [],
          nextConsumerId: 1,
        };
        const seedProducts = [
          { id:1, name:'Wireless Noise‑Cancelling Headphones', category:'Electronics', description:'Premium ANC, 30h battery.', imageUrl:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=300&fit=crop', sellingPrice:2499, costPrice:980, stock:45, archived:false, createdAt:'2026-01-10', variations:[{type:'Color', values:['Black','White','Blue']}], reviews:[] },
          { id:2, name:'Cashmere Blend Crewneck Sweater', category:'Fashion', description:'Ultra‑soft cashmere‑merino.', imageUrl:'https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=400&h=300&fit=crop', sellingPrice:3899, costPrice:1450, stock:32, archived:false, createdAt:'2026-02-15', variations:[{type:'Size', values:['S','M','L','XL']}], reviews:[] },
          { id:3, name:'Handcrafted Ceramic Vase Set', category:'Home & Living', description:'Set of three stoneware vases.', imageUrl:'https://images.unsplash.com/photo-1612196808214-b8e1d6145a8c?w=400&h=300&fit=crop', sellingPrice:1899, costPrice:620, stock:28, archived:false, createdAt:'2026-03-01', variations:[], reviews:[] },
          { id:4, name:'Professional Chef\'s Knife 8‑Inch', category:'Kitchen', description:'High‑carbon steel, walnut handle.', imageUrl:'https://images.unsplash.com/photo-1593618998160-e34014e67546?w=400&h=300&fit=crop', sellingPrice:1499, costPrice:510, stock:55, archived:false, createdAt:'2026-01-22', variations:[], reviews:[] },
          { id:5, name:'Ultrasonic Essential Oil Diffuser', category:'Beauty & Wellness', description:'500ml, auto shut‑off.', imageUrl:'https://images.unsplash.com/photo-1602928298849-325cec8771c0?w=400&h=300&fit=crop', sellingPrice:2199, costPrice:780, stock:40, archived:false, createdAt:'2026-04-10', variations:[], reviews:[] },
          { id:6, name:'Full‑Grain Leather Tote Bag', category:'Accessories', description:'Hand‑stitched leather, laptop sleeve.', imageUrl:'https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=400&h=300&fit=crop', sellingPrice:2999, costPrice:1120, stock:22, archived:false, createdAt:'2026-02-28', variations:[], reviews:[] },
          { id:7, name:'Smart Fitness Watch Pro', category:'Electronics', description:'AMOLED, GPS, SpO2.', imageUrl:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop', sellingPrice:4599, costPrice:1850, stock:38, archived:false, createdAt:'2026-05-05', variations:[], reviews:[] },
          { id:8, name:'Stonewashed Linen Tablecloth', category:'Home & Living', description:'Pure flax linen, 60x90in.', imageUrl:'https://images.unsplash.com/photo-1584589167171-541ce45f1eea?w=400&h=300&fit=crop', sellingPrice:1299, costPrice:420, stock:48, archived:false, createdAt:'2026-03-18', variations:[], reviews:[] },
        ];
        // Seed a few reviews for product 1
        seedProducts[0].reviews.push({name:'Alice',rating:5,comment:'Amazing sound!',date:new Date().toISOString()});
        seedProducts[0].reviews.push({name:'Bob',rating:4,comment:'Very comfortable.',date:new Date().toISOString()});
        defaultDB.products = seedProducts;
        defaultDB.nextProductId = seedProducts.length+1;
        localStorage.setItem(DB_KEY, JSON.stringify(defaultDB));
        return defaultDB;
      }
      return JSON.parse(raw);
    }
    function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

    // JWT simulation
    function createToken(payload) { const header={alg:'HS256',typ:'JWT'}; const now=Date.now(); const data={...payload,iat:now,exp:now+86400000}; return btoa(JSON.stringify(header))+'.'+btoa(JSON.stringify(data))+'.sig'; }
    function parseToken(token) { try { const parts=token.split('.'); if(parts.length!==3) return null; const data=JSON.parse(atob(parts[1])); if(data.exp && data.exp<Date.now()) return null; return data; } catch(e){return null;} }

    // Sessions & Cart
    let consumerSession=null, adminSession=null, cart=[];
    let currentStoreView='home', currentProductId=null, currentCategory='All', currentSearch='', currentSort='default';
    let adminTab='dashboard', reportTimeFilter='all';

    function loadCart() { const s=localStorage.getItem('atelier_cart_v4'); if(s) cart=JSON.parse(s); }
    function saveCart() { localStorage.setItem('atelier_cart_v4', JSON.stringify(cart)); }
    function loadSessions() {
      const ct=localStorage.getItem('atelier_consumer_token'); if(ct){ const d=parseToken(ct); if(d&&d.type==='consumer') consumerSession=d; else localStorage.removeItem('atelier_consumer_token'); }
      const at=localStorage.getItem('atelier_admin_token'); if(at){ const d=parseToken(at); if(d&&d.type==='admin'){ const db=getDB(); const u=db.users.find(u=>u.id===d.userId); if(u) adminSession={...d,user:u}; else localStorage.removeItem('atelier_admin_token'); } }
    }
    function saveConsumerSession() { if(consumerSession) localStorage.setItem('atelier_consumer_token',createToken(consumerSession)); else localStorage.removeItem('atelier_consumer_token'); }
    function saveAdminSession() { if(adminSession) localStorage.setItem('atelier_admin_token',createToken({type:'admin',userId:adminSession.user.id,role:adminSession.user.role,email:adminSession.user.email,name:adminSession.user.name})); else localStorage.removeItem('atelier_admin_token'); }
    function getCartCount() { return cart.reduce((s,i)=>s+i.qty,0); }
    function getCartTotal(db) { return cart.reduce((s,i)=>{ const p=db.products.find(x=>x.id===i.productId&&!x.archived); return p?s+p.sellingPrice*i.qty:s; },0); }
    function showToast(msg) { const c=document.getElementById('toast-container'); const t=document.createElement('div'); t.className='bg-black text-white px-4 py-2 rounded-full text-xs shadow-lg'; t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),2500); }
    function generateSerial(cat) { const d=new Date(); const ds=d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2); return cat.substring(0,4).toUpperCase()+'-'+ds+'-'+Math.random().toString(36).substring(2,8).toUpperCase(); }
    function profitMargin(sp,cp) { return sp>0?((sp-cp)/sp)*100:0; }
    function averageRating(reviews) { if(!reviews||reviews.length===0) return 0; return reviews.reduce((s,r)=>s+r.rating,0)/reviews.length; }

    // ==================== THREE.JS ====================
    let scene,camera,renderer,waveMesh,mouseX=0,mouseY=0;
    function initThree() {
      const canvas=document.getElementById('bg-canvas');
      scene=new THREE.Scene(); camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100); camera.position.z=15;
      renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true}); renderer.setSize(window.innerWidth,window.innerHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
      const geometry=new THREE.BufferGeometry(); const count=600; const positions=new Float32Array(count*3);
      for(let i=0;i<count;i++){ positions[i*3]=(Math.random()-0.5)*18; positions[i*3+1]=(Math.random()-0.5)*12; positions[i*3+2]=(Math.random()-0.5)*6; }
      geometry.setAttribute('position',new THREE.BufferAttribute(positions,3));
      const material=new THREE.PointsMaterial({size:0.05,color:0xc4b89a,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.5});
      waveMesh=new THREE.Points(geometry,material); scene.add(waveMesh);
      window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });
      document.addEventListener('mousemove',(e)=>{ mouseX=(e.clientX/window.innerWidth)*2-1; mouseY=-(e.clientY/window.innerHeight)*2+1; });
      animateThree();
    }
    function animateThree() { requestAnimationFrame(animateThree); waveMesh.rotation.y+=0.0003; waveMesh.rotation.x+=0.0002; waveMesh.position.x+=(mouseX*0.5-waveMesh.position.x)*0.03; waveMesh.position.y+=(mouseY*0.3-waveMesh.position.y)*0.03; renderer.render(scene,camera); }

    // ==================== CART DRAWER ====================
    function openCart() { document.getElementById('cart-drawer').classList.add('open'); document.getElementById('cart-overlay').classList.remove('hidden'); renderCartDrawer(); }
    function closeCart() { document.getElementById('cart-drawer').classList.remove('open'); document.getElementById('cart-overlay').classList.add('hidden'); }
    function renderCartDrawer() {
      const db=getDB(); const body=document.getElementById('cart-drawer-body'), footer=document.getElementById('cart-drawer-footer');
      if(cart.length===0){ body.innerHTML='<div class="text-center text-gray-400 py-10">🛒<p>Your cart is empty.</p></div>'; footer.innerHTML='<button class="w-full border py-2 rounded-full text-sm" onclick="closeCart()">Continue Shopping</button>'; }
      else {
        body.innerHTML=cart.map(ci=>{ const p=db.products.find(x=>x.id===ci.productId); if(!p)return''; const varText=ci.variation?`(${ci.variation.type}: ${ci.variation.value})`:''; return `
          <div class="flex gap-3 items-center border-b pb-3">
            <img src="${p.imageUrl}" class="w-14 h-14 object-cover rounded-lg" onerror="this.src='data:image/svg+xml,...'">
            <div class="flex-1"><h4 class="text-sm font-medium">${p.name} ${varText}</h4><div class="text-xs text-gray-500">₹${p.sellingPrice}</div></div>
            <div class="flex items-center gap-1"><button class="w-7 h-7 rounded-full border text-xs" onclick="updateCartQty(${p.id},${ci.qty-1})">−</button><span class="w-6 text-center">${ci.qty}</span><button class="w-7 h-7 rounded-full border text-xs" onclick="updateCartQty(${p.id},${ci.qty+1})">+</button></div>
            <button class="text-red-500 text-xs" onclick="removeCartItem(${p.id})">Remove</button>
          </div>`; }).join('');
        const total=getCartTotal(db);
        footer.innerHTML=`<div class="flex justify-between font-semibold text-lg mb-3"><span>Total</span><span>₹${total.toFixed(2)}</span></div><button class="w-full btn-charcoal" onclick="proceedToCheckout()">Proceed to Checkout</button><button class="w-full border mt-2 py-2 rounded-full text-sm" onclick="closeCart()">Continue Shopping</button>`;
      }
      document.getElementById('cart-count-badge').textContent=getCartCount();
    }
    function updateCartQty(pid,qty) { const db=getDB(); const p=db.products.find(x=>x.id===pid); if(!p||qty<0)return; if(qty===0){removeCartItem(pid);return;} if(qty>p.stock){showToast('Only '+p.stock+' in stock');return;} const ci=cart.find(c=>c.productId===pid); if(ci){ci.qty=qty;saveCart();renderCartDrawer();} }
    function removeCartItem(pid) { cart=cart.filter(c=>c.productId!==pid); saveCart(); renderCartDrawer(); document.getElementById('cart-count-badge').textContent=getCartCount(); }
    function addToCart(pid, variation=null) {
      const db=getDB(); const p=db.products.find(x=>x.id===pid&&!x.archived); if(!p||p.stock<=0){showToast('Unavailable');return;}
      const existing=cart.find(c=>c.productId===pid && JSON.stringify(c.variation)===JSON.stringify(variation));
      if(existing){ if(existing.qty<p.stock) existing.qty++; else{showToast('Stock limit');return;} }
      else cart.push({productId:pid, qty:1, variation:variation||null});
      saveCart(); document.getElementById('cart-count-badge').textContent=getCartCount(); showToast(p.name+' added'); openCart();
    }
    function proceedToCheckout() { closeCart(); currentStoreView='checkout'; renderStoreContent(); window.scrollTo(0,0); }

    // ==================== STOREFRONT RENDERING ====================
    function renderStoreContent() {
      const db=getDB(); const area=document.getElementById('store-content-area');
      if(currentStoreView==='home') area.innerHTML = renderHome(db);
      else if(currentStoreView==='product') area.innerHTML = renderProductDetail(db);
      else if(currentStoreView==='checkout') area.innerHTML = renderCheckout(db);
      else if(currentStoreView==='orders') area.innerHTML = renderConsumerOrders(db);
      setTimeout(()=>{ ScrollTrigger.refresh(); document.querySelectorAll('.product-card').forEach(c=>c.classList.add('visible')); applyHeroShimmer(); },100);
    }
    function applyHeroShimmer() {
      const hero=document.querySelector('.hero-title'); if(!hero)return;
      hero.addEventListener('mousemove',(e)=>{ const rect=hero.getBoundingClientRect(); const x=e.clientX-rect.left, y=e.clientY-rect.top; const cx=rect.width/2, cy=rect.height/2; const ox=(x-cx)/cx*8, oy=(y-cy)/cy*4; hero.style.textShadow=`${ox}px ${oy}px 12px rgba(184,147,110,0.5), ${-ox}px ${-oy}px 12px rgba(120,90,60,0.3)`; });
      hero.addEventListener('mouseleave',()=>{ hero.style.textShadow='none'; });
    }

    function renderHome(db) {
      const categories=db.categories||[];
      const active=db.products.filter(p=>!p.archived);
      let filtered = currentCategory==='All'? active : active.filter(p=>p.category===currentCategory);
      if(currentSearch.trim()){ const q=currentSearch.toLowerCase(); filtered=filtered.filter(p=>p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)); }
      if(currentSort==='price-asc') filtered.sort((a,b)=>a.sellingPrice-b.sellingPrice);
      else if(currentSort==='price-desc') filtered.sort((a,b)=>b.sellingPrice-a.sellingPrice);
      else if(currentSort==='rating') filtered.sort((a,b)=>averageRating(b.reviews)-averageRating(a.reviews));
      const catPills = ['All', ...categories].map(c=>`<span class="px-4 py-1.5 rounded-full border cursor-pointer text-xs ${c===currentCategory?'bg-black text-white':''}" onclick="setCategory('${c}')">${c}</span>`).join('');
      return `
        <section class="text-center py-12 md:py-16">
          <h1 class="hero-title text-4xl md:text-5xl font-serif tracking-widest mb-3">Thoughtfully Curated<br>Everyday Essentials</h1>
          <p class="text-gray-600 max-w-lg mx-auto">Premium electronics, artisan home goods, and timeless fashion.</p>
        </section>
        <div class="flex flex-col md:flex-row gap-4 mb-6 items-center justify-between">
          <div class="flex flex-wrap gap-2 justify-center">${catPills}</div>
          <div class="flex gap-3 items-center">
            <input type="text" placeholder="Search products..." id="search-input" class="px-4 py-2 rounded-full border text-sm w-48" value="${currentSearch}" oninput="updateSearch(this.value)">
            <select id="sort-select" class="px-3 py-2 rounded-full border text-sm" onchange="updateSort(this.value)">
              <option value="default" ${currentSort==='default'?'selected':''}>Sort: Default</option>
              <option value="price-asc" ${currentSort==='price-asc'?'selected':''}>Price: Low to High</option>
              <option value="price-desc" ${currentSort==='price-desc'?'selected':''}>Price: High to Low</option>
              <option value="rating" ${currentSort==='rating'?'selected':''}>Top Rated</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="products-grid">
          ${filtered.map(p=>`<div class="product-card bg-white border border-gray-100 rounded-2xl overflow-hidden cursor-pointer card-hover" onclick="navigateStore('product',${p.id})">
            <img src="${p.imageUrl}" class="w-full h-48 object-cover" onerror="this.src='data:image/svg+xml,...'">
            <div class="p-4"><div class="text-xs uppercase tracking-widest text-[#7d5d3f]">${p.category}</div>
            <h3 class="font-serif text-lg mt-1">${p.name}</h3>
            <div class="flex items-center gap-1 text-sm">${renderStars(averageRating(p.reviews))} <span class="text-xs text-gray-500">(${p.reviews.length})</span></div>
            <div class="font-semibold">₹${p.sellingPrice}</div>
            <div class="text-xs ${p.stock<=5?'text-red-500':''}">${p.stock<=5?'Only '+p.stock+' left':'In stock'}</div></div>
          </div>`).join('')}
        </div>`;
    }
    function renderStars(avg) { const full=Math.round(avg); let s=''; for(let i=0;i<5;i++) s+=i<full?'<span class="star">★</span>':'<span class="star empty">★</span>'; return s; }
    function setCategory(cat) { currentCategory=cat; renderStoreContent(); }
    function updateSearch(val) { currentSearch=val; renderStoreContent(); }
    function updateSort(val) { currentSort=val; renderStoreContent(); }
    function navigateStore(view,pid=null) { currentStoreView=view; currentProductId=pid; renderStoreContent(); window.scrollTo(0,0); }

    function renderProductDetail(db) {
      const p=db.products.find(x=>x.id===currentProductId&&!x.archived); if(!p) return navigateStore('home');
      const avgRating = averageRating(p.reviews);
      const variationHTML = p.variations&&p.variations.length>0 ? p.variations.map(v=>`
        <div class="mb-2"><span class="text-sm font-medium">${v.type}:</span>
          <div class="flex gap-2 mt-1">${v.values.map(val=>`<span class="px-3 py-1 border rounded-full text-xs cursor-pointer variation-option" data-type="${v.type}" data-value="${val}" onclick="selectVariation(this,'${v.type}','${val}')">${val}</span>`).join('')}</div>
        </div>`).join('') : '';
      return `
        <button class="mb-4 border px-4 py-1.5 rounded-full text-sm" onclick="navigateStore('home')">← Back</button>
        <div class="flex flex-col md:flex-row gap-8">
          <img src="${p.imageUrl}" class="w-full md:w-1/2 h-80 object-cover rounded-2xl">
          <div class="flex-1">
            <div class="text-xs uppercase text-[#7d5d3f]">${p.category}</div>
            <h2 class="text-3xl font-serif">${p.name}</h2>
            <div class="flex items-center gap-2 my-1">${renderStars(avgRating)} <span class="text-sm">${avgRating.toFixed(1)} (${p.reviews.length} reviews)</span></div>
            <div class="text-2xl font-semibold my-2">₹${p.sellingPrice}</div>
            <p class="text-gray-600">${p.description}</p>
            <div class="mt-4"><span class="text-sm ${p.stock<=5?'text-red-500':''}">${p.stock<=5?'Only '+p.stock+' left':'In stock'}</span></div>
            <div id="variation-container" class="my-4">${variationHTML}</div>
            <div class="flex gap-3 mt-4">
              <button class="btn-charcoal flex-1" onclick="addProductToCart(${p.id})" ${p.stock<=0?'disabled':''}>Add to Cart</button>
              <button class="border-2 border-black text-black px-6 py-3 rounded-full font-medium hover:bg-black hover:text-white transition" onclick="buyNow(${p.id})">Buy Now</button>
            </div>
          </div>
        </div>
        <div class="mt-8 bg-white rounded-2xl p-6 border">
          <h3 class="font-serif text-xl mb-4">Customer Reviews</h3>
          <div id="review-list" class="space-y-3 mb-4">${p.reviews.map(r=>`<div class="border-b pb-2"><div class="flex items-center gap-2"><strong>${r.name}</strong> ${renderStars(r.rating)} <span class="text-xs text-gray-400">${new Date(r.date).toLocaleDateString()}</span></div><p class="text-sm">${r.comment}</p></div>`).join('')}</div>
          <h4 class="font-medium mb-2">Leave a Review</h4>
          <div class="flex gap-2 flex-wrap"><input id="review-name" placeholder="Your name" class="flex-1"><select id="review-rating" class="border rounded px-2"><option value="5">5 ★</option><option value="4">4 ★</option><option value="3">3 ★</option><option value="2">2 ★</option><option value="1">1 ★</option></select></div>
          <textarea id="review-comment" rows="2" class="w-full mt-2 border rounded" placeholder="Write your comment..."></textarea>
          <button class="btn-charcoal mt-2" onclick="submitReview(${p.id})">Submit Review</button>
        </div>`;
    }
    let selectedVariation = null;
    function selectVariation(el, type, value) {
      document.querySelectorAll('.variation-option').forEach(e=>e.classList.remove('bg-black','text-white'));
      el.classList.add('bg-black','text-white');
      selectedVariation = {type, value};
    }
    function addProductToCart(pid) {
      const db=getDB(); const p=db.products.find(x=>x.id===pid); if(!p)return;
      if(p.variations&&p.variations.length>0 && !selectedVariation){ showToast('Please select a variation'); return; }
      addToCart(pid, selectedVariation);
    }
    function buyNow(pid) {
      const db=getDB(); const p=db.products.find(x=>x.id===pid); if(!p||p.stock<=0){showToast('Unavailable');return;}
      if(p.variations&&p.variations.length>0 && !selectedVariation){ showToast('Please select a variation'); return; }
      cart = [{productId:pid, qty:1, variation:selectedVariation||null}];
      saveCart(); document.getElementById('cart-count-badge').textContent=getCartCount();
      currentStoreView='checkout'; renderStoreContent(); window.scrollTo(0,0);
    }
    function submitReview(pid) {
      const db=getDB(); const p=db.products.find(x=>x.id===pid); if(!p)return;
      const name=document.getElementById('review-name')?.value.trim(), rating=parseInt(document.getElementById('review-rating')?.value), comment=document.getElementById('review-comment')?.value.trim();
      if(!name||!comment){showToast('Name and comment required');return;}
      p.reviews.push({name,rating,comment,date:new Date().toISOString()});
      saveDB(db); renderStoreContent(); showToast('Review submitted!');
    }

    function renderCheckout(db) {
      if(cart.length===0) return '<div class="text-center py-20">🛒<p>Cart empty</p><button class="border px-4 py-2 rounded-full mt-3" onclick="navigateStore(\'home\')">Shop</button></div>';
      const total=getCartTotal(db);
      return `<div class="max-w-lg mx-auto py-8"><h2 class="text-2xl font-serif text-center mb-6">Checkout</h2>
        <div class="bg-gray-50 p-4 rounded-xl mb-4 text-center">Total: <strong>₹${total.toFixed(2)}</strong></div>
        <div class="space-y-3"><input id="chk-name" placeholder="Full Name" class="w-full"><input id="chk-email" placeholder="Email" class="w-full"><input id="chk-address" placeholder="Address" class="w-full">
        <select id="chk-payment" class="w-full"><option>COD</option><option>UPI (Simulated)</option></select>
        <button class="btn-charcoal w-full" onclick="submitCheckout()">Place Order</button></div></div>`;
    }
    function submitCheckout() {
      const name=document.getElementById('chk-name')?.value.trim(), email=document.getElementById('chk-email')?.value.trim(), addr=document.getElementById('chk-address')?.value.trim();
      if(!name||!email||!addr){showToast('Fill all fields');return;}
      const db=getDB(); const items=[]; let rev=0, cogs=0;
      for(const ci of cart) { const p=db.products.find(x=>x.id===ci.productId); if(!p||p.stock<ci.qty){showToast('Stock issue');return;}
        const lt=p.sellingPrice*ci.qty, lc=p.costPrice*ci.qty; rev+=lt; cogs+=lc;
        items.push({productId:p.id,productName:p.name,category:p.category,qty:ci.qty,unitPrice:p.sellingPrice,unitCost:p.costPrice,lineTotal:lt,serial:generateSerial(p.category),variation:ci.variation||null});
        p.stock-=ci.qty; if(p.stock<=5) console.warn('Low stock:',p.name);
      }
      db.orders.push({id:db.nextOrderId++,customerEmail:email,customerName:name,shippingAddress:addr,paymentMethod:document.getElementById('chk-payment')?.value,items,totalRevenue:rev,totalCOGS:cogs,netProfit:rev-cogs,status:'pending',createdAt:new Date().toISOString()});
      saveDB(db); cart=[]; saveCart(); document.getElementById('cart-count-badge').textContent='0';
      document.getElementById('store-content-area').innerHTML=`<div class="text-center py-20">✅<h3 class="text-xl font-serif">Order Confirmed!</h3><p>Thank you, ${name}.</p><div class="mt-3">${items.map(i=>`<span class="bg-gray-100 px-2 py-1 rounded-full text-xs">${i.serial}</span>`).join(' ')}</div><button class="border px-4 py-2 rounded-full mt-4" onclick="navigateStore('home')">Continue Shopping</button></div>`;
      showToast('Order placed!');
    }
    function renderConsumerOrders(db) {
      if(!consumerSession) return '<div class="text-center py-20">🔒 Please login.<button class="border px-4 py-2 rounded-full mt-3" onclick="openAuth(\'login\')">Login</button></div>';
      const orders=db.orders.filter(o=>o.customerEmail===consumerSession.email).reverse();
      if(orders.length===0) return '<div class="text-center py-20">No orders yet.</div>';
      return `<h2 class="text-2xl font-serif mb-6">My Orders</h2>`+orders.map(o=>`<div class="bg-white border rounded-2xl p-4 mb-3">
        <div class="flex justify-between"><strong>#${o.id}</strong><span class="status-badge status-${o.status}">${o.status}</span></div>
        <div class="text-sm text-gray-600">${o.items.map(i=>i.productName+(i.variation?` (${i.variation.type}:${i.variation.value})`:'')+' x'+i.qty).join(', ')}</div>
        <div class="font-semibold">₹${o.totalRevenue.toFixed(2)}</div>
        ${o.status==='pending'?`<button class="text-red-500 text-xs mt-2 underline" onclick="cancelOrder(${o.id})">Cancel Order</button>`:''}
      </div>`).join('');
    }
    function cancelOrder(orderId) {
      const db=getDB(); const order=db.orders.find(o=>o.id===orderId);
      if(!order||order.status!=='pending'){showToast('Cannot cancel');return;}
      order.status='cancelled';
      order.items.forEach(i=>{ const p=db.products.find(x=>x.id===i.productId); if(p) p.stock+=i.qty; });
      saveDB(db); renderStoreContent(); showToast('Order cancelled, stock restored.');
    }

    // ==================== AUTH ====================
    function openAuth(mode) {
      const overlay=document.getElementById('auth-modal-overlay'), dialog=document.getElementById('auth-modal-dialog');
      dialog.innerHTML=`<button class="absolute top-3 right-4 text-xl" onclick="closeAuth()">&times;</button><h3 class="text-xl font-serif mb-4">${mode==='login'?'Sign In':'Register'}</h3>
        ${mode==='register'?'<input id="auth-name" placeholder="Full Name" class="w-full mb-2">':''}
        <input id="auth-email" placeholder="Email" class="w-full mb-2"><input type="password" id="auth-password" placeholder="Password" class="w-full mb-4">
        <button class="btn-charcoal w-full" onclick="submitConsumerAuth('${mode}')">${mode==='login'?'Login':'Create Account'}</button>
        <p class="text-xs text-center mt-2">${mode==='login'?'New? <span class="underline cursor-pointer" onclick="openAuth(\'register\')">Register</span>':'Have account? <span class="underline cursor-pointer" onclick="openAuth(\'login\')">Login</span>'}</p>`;
      overlay.classList.add('active');
    }
    function closeAuth() { document.getElementById('auth-modal-overlay').classList.remove('active'); }
    function submitConsumerAuth(mode) {
      const email=document.getElementById('auth-email')?.value.trim(), pass=document.getElementById('auth-password')?.value.trim();
      if(!email||!pass){showToast('Fill fields');return;} const db=getDB();
      if(mode==='register'){
        const name=document.getElementById('auth-name')?.value.trim(); if(!name){showToast('Name required');return;}
        if(db.consumerUsers.find(u=>u.email===email)){showToast('Email exists');return;}
        db.consumerUsers.push({id:db.nextConsumerId++,name,email,password:pass,createdAt:new Date().toISOString()});
        saveDB(db); consumerSession={type:'consumer',userId:db.nextConsumerId-1,email,name}; saveConsumerSession();
      }else{
        const u=db.consumerUsers.find(u=>u.email===email&&u.password===pass); if(!u){showToast('Invalid credentials');return;}
        consumerSession={type:'consumer',userId:u.id,email:u.email,name:u.name}; saveConsumerSession();
      }
      closeAuth(); updateUI(); renderStoreContent(); showToast('Welcome!');
    }
    function logoutConsumer() { consumerSession=null; saveConsumerSession(); updateUI(); renderStoreContent(); showToast('Logged out'); }
    function openAdminLogin() {
      const overlay=document.getElementById('auth-modal-overlay'), dialog=document.getElementById('auth-modal-dialog');
      dialog.innerHTML=`<button class="absolute top-3 right-4 text-xl" onclick="closeAuth()">&times;</button><h3 class="text-xl font-serif mb-4">Admin Login</h3>
        <input id="admin-email" placeholder="Email" class="w-full mb-2"><input type="password" id="admin-password" placeholder="Password" class="w-full mb-4">
        <button class="btn-charcoal w-full" onclick="submitAdminLogin()">Sign In</button><p class="text-xs text-center mt-2 text-gray-400">Demo: owner@admin.com / password123</p>`;
      overlay.classList.add('active');
    }
    function submitAdminLogin() {
      const email=document.getElementById('admin-email')?.value.trim(), pass=document.getElementById('admin-password')?.value.trim();
      if(!email||!pass){showToast('Fill fields');return;} const db=getDB(); const u=db.users.find(u=>u.email===email&&u.password===pass);
      if(!u){showToast('Invalid');return;} adminSession={type:'admin',userId:u.id,role:u.role,email:u.email,name:u.name,user:u}; saveAdminSession();
      closeAuth(); switchToAdmin(); showToast('Welcome, '+u.name);
    }
    function adminLogout() { adminSession=null; saveAdminSession(); switchToStore(); showToast('Logged out'); }

    // ==================== VIEW SWITCHING ====================
    function switchToStore() { document.getElementById('view-admin').classList.add('hidden'); document.getElementById('view-storefront').classList.remove('hidden'); renderStoreContent(); }
    function switchToAdmin() { document.getElementById('view-storefront').classList.add('hidden'); document.getElementById('view-admin').classList.remove('hidden'); renderAdmin(); }
    function updateUI() {
      const btn=document.getElementById('btn-user-menu');
      if(consumerSession){ btn.textContent='👤 '+consumerSession.name.split(' ')[0]; btn.onclick=logoutConsumer; }
      else { btn.textContent='Sign In'; btn.onclick=()=>openAuth('login'); }
      document.getElementById('cart-count-badge').textContent=getCartCount();
    }

    // ==================== ADMIN PANEL ====================
    function renderAdmin() {
      if(!adminSession) return switchToStore();
      document.getElementById('admin-user-name').textContent=adminSession.name;
      const badge=document.getElementById('admin-role-badge'); badge.textContent=adminSession.role; badge.className='text-xs font-bold uppercase px-2 py-0.5 rounded-full '+(adminSession.role==='owner'?'bg-amber-100 text-amber-800':'bg-blue-100 text-blue-800');
      const db=getDB(); const sidebar=document.getElementById('admin-sidebar');
      let tabs=[{id:'dashboard',label:'Dashboard'}];
      if(adminSession.role==='owner'||adminSession.role==='admin'){ tabs.push({id:'products',label:'Products'}); tabs.push({id:'categories',label:'Categories'}); }
      if(adminSession.role==='owner'||adminSession.role==='admin'||adminSession.role==='staff') tabs.push({id:'orders',label:'Orders'});
      if(adminSession.role==='owner') tabs.push({id:'reports',label:'Financials'},{id:'users',label:'Manage Users'});
      sidebar.innerHTML=tabs.map(t=>`<button class="px-4 py-1.5 rounded-full border text-sm ${adminTab===t.id?'bg-black text-white':''}" onclick="switchAdminTab('${t.id}')">${t.label}</button>`).join('');
      const panel=document.getElementById('admin-content-panel');
      if(adminTab==='dashboard') panel.innerHTML=renderAdminDashboard(db);
      else if(adminTab==='products') panel.innerHTML=renderAdminProducts(db);
      else if(adminTab==='categories') panel.innerHTML=renderAdminCategories(db);
      else if(adminTab==='orders') panel.innerHTML=renderAdminOrders(db);
      else if(adminTab==='reports') panel.innerHTML=renderAdminReports(db);
      else if(adminTab==='users') panel.innerHTML=renderAdminUsers(db);
    }
    function switchAdminTab(tab){adminTab=tab;renderAdmin();}
    function renderAdminDashboard(db){const active=db.products.filter(p=>!p.archived);return `<h3 class="text-xl font-serif">Dashboard</h3><div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">${[{v:active.length,l:'Products'},{v:active.reduce((s,p)=>s+p.stock,0),l:'Stock'},{v:db.orders.length,l:'Orders'},{v:db.orders.filter(o=>o.status==='pending').length,l:'Pending'}].map(m=>`<div class="bg-gray-50 p-4 rounded-xl text-center"><div class="text-2xl font-bold">${m.v}</div><div class="text-xs uppercase text-gray-500">${m.l}</div></div>`).join('')}</div>`;}

    function renderAdminCategories(db) {
      const cats = db.categories||[];
      return `<h3 class="text-xl font-serif mb-4">Manage Categories</h3>
        <div class="flex gap-2 mb-4"><input id="new-category-name" placeholder="New category" class="flex-1"><button class="btn-charcoal" onclick="addCategory()">Add</button></div>
        <div class="space-y-2">${cats.map(c=>`<div class="flex justify-between items-center border-b pb-2"><span>${c}</span><button class="text-red-500 text-xs border px-2 py-0.5 rounded" onclick="deleteCategory('${c}')">Delete</button></div>`).join('')}</div>`;
    }
    function addCategory() {
      const db=getDB(); const name=document.getElementById('new-category-name')?.value.trim(); if(!name)return;
      if(!db.categories.includes(name)){ db.categories.push(name); saveDB(db); renderAdmin(); showToast('Category added'); }
      else showToast('Already exists');
    }
    function deleteCategory(cat) {
      const db=getDB(); if(cat==='Uncategorized'){showToast('Cannot delete Uncat');return;}
      const productsInCat = db.products.filter(p=>p.category===cat&&!p.archived);
      if(productsInCat.length>0){
        if(confirm(`There are ${productsInCat.length} products in "${cat}". Move them to "Uncategorized"?`)){
          productsInCat.forEach(p=>p.category='Uncategorized');
          if(!db.categories.includes('Uncategorized')) db.categories.push('Uncategorized');
          db.categories = db.categories.filter(c=>c!==cat);
          saveDB(db); renderAdmin(); showToast('Category deleted, products moved');
        }
      } else {
        db.categories = db.categories.filter(c=>c!==cat);
        saveDB(db); renderAdmin(); showToast('Category deleted');
      }
    }

    function renderAdminProducts(db) {
      const prods=db.products.filter(p=>!p.archived); const cats=db.categories||[];
      return `<div class="flex justify-between items-center mb-4"><h3 class="text-xl font-serif">Products</h3><button class="btn-charcoal text-sm px-4 py-2" onclick="openProductModal()">+ Add</button></div>
      <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th>${adminSession.role==='owner'?'<th>Cost</th><th>Margin</th>':''}<th>Stock</th><th>Actions</th></tr></thead><tbody>
      ${prods.map(p=>`<tr><td>#${p.id}</td><td>${p.name}</td><td>${p.category}</td><td>₹${p.sellingPrice}</td>${adminSession.role==='owner'?`<td>₹${p.costPrice}</td><td>${profitMargin(p.sellingPrice,p.costPrice).toFixed(1)}%</td>`:''}<td><input type="number" value="${p.stock}" class="w-16 text-center border rounded" onchange="updateStockDirect(${p.id},this.value)"></td><td><button class="text-xs border px-2 py-0.5 rounded" onclick="openProductModal(${p.id})">Edit</button><button class="text-xs text-red-500 ml-1" onclick="deleteProduct(${p.id})">Delete</button><button class="text-xs ml-1 border px-2 py-0.5 rounded" onclick="openRestockModal(${p.id})">+Stock</button></td></tr>`).join('')}
      </tbody></table></div>`;
    }
    function updateStockDirect(pid,val){const db=getDB();const p=db.products.find(x=>x.id===pid);if(p){p.stock=parseInt(val)||0;saveDB(db);renderAdmin();}}
    function openRestockModal(pid){const db=getDB();const p=db.products.find(x=>x.id===pid);if(!p)return;const overlay=document.getElementById('generic-modal-overlay'),dialog=document.getElementById('generic-modal-dialog');
      dialog.innerHTML=`<button class="absolute top-3 right-4 text-xl" onclick="closeGenericModal()">&times;</button><h4 class="font-serif text-lg">Restock: ${p.name}</h4><input id="restock-qty" type="number" placeholder="Quantity" class="w-full mb-2" value="10"><input id="restock-cost" type="number" step="0.01" placeholder="Total Restock Purchase Cost (₹)" class="w-full mb-4"><button class="btn-charcoal w-full" onclick="submitRestock(${pid})">Add Stock & Record Cost</button>`;
      overlay.classList.add('active');}
    function submitRestock(pid){const qty=parseInt(document.getElementById('restock-qty')?.value)||0;const cost=parseFloat(document.getElementById('restock-cost')?.value)||0;if(qty<=0||cost<0)return;const db=getDB();const p=db.products.find(x=>x.id===pid);if(p){p.stock+=qty;db.restockLog.push({productId:pid,quantity:qty,totalCost:cost,date:new Date().toISOString()});saveDB(db);closeGenericModal();renderAdmin();showToast('Stock added & cost recorded');}}
    function openProductModal(pid=null){
      const db=getDB();const p=pid?db.products.find(x=>x.id===pid):null;const cats=db.categories||[];const overlay=document.getElementById('generic-modal-overlay'),dialog=document.getElementById('generic-modal-dialog');
      dialog.innerHTML=`<button class="absolute top-3 right-4 text-xl" onclick="closeGenericModal()">&times;</button><h4 class="font-serif text-lg">${pid?'Edit':'Add'} Product</h4>
        <input id="pm-name" placeholder="Name" class="w-full mb-2" value="${p?p.name:''}">
        <select id="pm-category" class="w-full mb-2">${cats.map(c=>`<option ${p&&p.category===c?'selected':''}>${c}</option>`).join('')}</select>
        <input id="pm-desc" placeholder="Description" class="w-full mb-2" value="${p?p.description:''}">
        <input id="pm-image" placeholder="Image URL" class="w-full mb-2" value="${p?p.imageUrl:''}"><input type="file" id="pm-file" class="w-full mb-2 text-xs" accept="image/*" onchange="handleImageUpload()">
        <input id="pm-price" type="number" step="0.01" placeholder="Selling Price" class="w-full mb-2" value="${p?p.sellingPrice:''}">
        ${adminSession.role==='owner'?`<input id="pm-cost" type="number" step="0.01" placeholder="Cost Price" class="w-full mb-2" value="${p?p.costPrice:''}">`:''}
        <input id="pm-stock" type="number" placeholder="Stock" class="w-full mb-2" value="${p?p.stock:'10'}">
        <div class="mb-2"><label class="text-sm">Variations (comma separated values, e.g., Color:Red,Blue,Green)</label><input id="pm-variations" class="w-full" value="${p&&p.variations?p.variations.map(v=>v.type+':'+v.values.join(',')).join(';'):''}"></div>
        <input type="hidden" id="pm-edit-id" value="${pid||''}">
        <button class="btn-charcoal w-full" onclick="saveProduct()">Save</button>`;
      overlay.classList.add('active');
    }
    function handleImageUpload(){const file=document.getElementById('pm-file')?.files[0];if(file){const reader=new FileReader();reader.onload=function(e){document.getElementById('pm-image').value=e.target.result;};reader.readAsDataURL(file);}}
    function saveProduct(){
      const db=getDB();const name=document.getElementById('pm-name').value.trim(),cat=document.getElementById('pm-category').value,desc=document.getElementById('pm-desc').value,img=document.getElementById('pm-image').value,price=parseFloat(document.getElementById('pm-price').value),cost=parseFloat(document.getElementById('pm-cost')?.value)||0,stock=parseInt(document.getElementById('pm-stock').value)||0,editId=document.getElementById('pm-edit-id').value;
      const varStr=document.getElementById('pm-variations')?.value; let variations=[]; if(varStr){ variations=varStr.split(';').map(v=>{const [type,vals]=v.split(':'); return {type:type.trim(),values:vals.split(',').map(v=>v.trim())}; }); }
      if(!name||isNaN(price)){showToast('Name and price required');return;}
      if(editId){const p=db.products.find(x=>x.id===parseInt(editId));if(p){p.name=name;p.category=cat;p.description=desc;p.imageUrl=img||p.imageUrl;p.sellingPrice=price;if(adminSession.role==='owner')p.costPrice=cost;p.stock=stock;p.variations=variations;}}
      else{db.products.push({id:db.nextProductId++,name,category:cat,description:desc,imageUrl:img||'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=300&fit=crop',sellingPrice:price,costPrice:adminSession.role==='owner'?cost:0,stock,archived:false,createdAt:new Date().toISOString().split('T')[0],variations,reviews:[]});}
      saveDB(db);closeGenericModal();renderAdmin();showToast('Product saved');
    }
    function deleteProduct(pid){const db=getDB();const hasOrders=db.orders.some(o=>o.items.some(i=>i.productId===pid));if(!hasOrders){db.products=db.products.filter(p=>p.id!==pid);showToast('Product deleted');}else{const p=db.products.find(x=>x.id===pid);if(p){p.archived=true;db.archivedProducts.push({...p,archivedAt:new Date().toISOString()});showToast('Product archived (has sales)');}}saveDB(db);renderAdmin();}
    function closeGenericModal(){document.getElementById('generic-modal-overlay').classList.remove('active');}
    function renderAdminOrders(db){const orders=[...db.orders].reverse();return `<h3 class="text-xl font-serif mb-4">Orders</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th>ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Action</th></tr></thead><tbody>${orders.map(o=>`<tr><td>#${o.id}</td><td>${o.customerName}</td><td>${o.items.map(i=>i.productName).join(', ')}</td><td>₹${o.totalRevenue}</td><td><span class="status-badge status-${o.status}">${o.status}</span></td><td><select class="border rounded text-xs" onchange="updateOrderStatus(${o.id},this.value)"><option>Change</option><option value="pending">Pending</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option></select></td></tr>`).join('')}</tbody></table></div>`;}
    function updateOrderStatus(oid,status){if(!status)return;const db=getDB();const o=db.orders.find(x=>x.id===oid);if(o){o.status=status;saveDB(db);renderAdmin();showToast('Order updated');}}
    function renderAdminReports(db){const now=new Date();let filtered=db.orders;if(reportTimeFilter==='day'){const today=now.toISOString().split('T')[0];filtered=db.orders.filter(o=>o.createdAt.split('T')[0]===today);}else if(reportTimeFilter==='month'){const month=now.toISOString().substring(0,7);filtered=db.orders.filter(o=>o.createdAt.substring(0,7)===month);}else if(reportTimeFilter==='year'){const year=now.getFullYear().toString();filtered=db.orders.filter(o=>o.createdAt.substring(0,4)===year);}const totalRev=filtered.reduce((s,o)=>s+o.totalRevenue,0),totalCOGS=filtered.reduce((s,o)=>s+o.totalCOGS,0);const totalRestockCost=db.restockLog.reduce((s,r)=>s+r.totalCost,0);const netProfit=totalRev-totalCOGS-totalRestockCost;const productSales={};filtered.forEach(o=>o.items.forEach(i=>{if(!productSales[i.productName])productSales[i.productName]={units:0,revenue:0};productSales[i.productName].units+=i.qty;productSales[i.productName].revenue+=i.lineTotal;}));const top=Object.entries(productSales).sort((a,b)=>b[1].revenue-a[1].revenue).slice(0,5);return `<h3 class="text-xl font-serif">Financial Reports</h3><div class="flex gap-2 my-3">${['all','day','month','year'].map(f=>`<button class="px-3 py-1 rounded-full border text-xs ${reportTimeFilter===f?'bg-black text-white':''}" onclick="setReportFilter('${f}')">${f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}</div><div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">${[{v:`₹${totalRev.toFixed(2)}`,l:'Gross Revenue'},{v:`₹${totalCOGS.toFixed(2)}`,l:'COGS'},{v:`₹${totalRestockCost.toFixed(2)}`,l:'Restock Costs'},{v:`₹${netProfit.toFixed(2)}`,l:'Net Profit'}].map(m=>`<div class="bg-gray-50 p-3 rounded-xl text-center"><div class="text-xl font-bold">${m.v}</div><div class="text-xs text-gray-500">${m.l}</div></div>`).join('')}</div><h4 class="font-serif">Top Products</h4><table class="w-full text-sm"><thead><tr><th>Rank</th><th>Product</th><th>Units</th><th>Revenue</th></tr></thead><tbody>${top.map(([n,d],i)=>`<tr><td>#${i+1}</td><td>${n}</td><td>${d.units}</td><td>₹${d.revenue.toFixed(2)}</td></tr>`).join('')}</tbody></table>`;}
    function setReportFilter(f){reportTimeFilter=f;renderAdmin();}
    function renderAdminUsers(db){return `<h3 class="text-xl font-serif mb-4">Staff Management</h3><div class="mb-4"><h4 class="font-medium">Add User</h4><div class="flex gap-2 flex-wrap"><input id="new-user-name" placeholder="Name" class="flex-1"><input id="new-user-email" placeholder="Email"><input type="password" id="new-user-pass" placeholder="Password"><select id="new-user-role"><option value="admin">Admin</option><option value="staff">Staff</option></select><button class="btn-charcoal text-xs px-4" onclick="addStaffUser()">Add</button></div></div><table class="w-full text-sm"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead><tbody>${db.users.map(u=>`<tr><td>#${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td><td>${u.id!==adminSession.user.id?`<button class="text-red-500 text-xs" onclick="deleteUser(${u.id})">Remove</button> <button class="text-xs border px-2 py-0.5 rounded" onclick="changeUserPassword(${u.id})">Reset PW</button>`:''}</td></tr>`).join('')}</tbody></table>`;}
    function addStaffUser(){const name=document.getElementById('new-user-name')?.value.trim(),email=document.getElementById('new-user-email')?.value.trim(),pass=document.getElementById('new-user-pass')?.value,role=document.getElementById('new-user-role')?.value;if(!name||!email||!pass)return;const db=getDB();db.users.push({id:db.users.length+1,name,email,password:pass,role});saveDB(db);renderAdmin();showToast('User added');}
    function deleteUser(uid){if(uid===adminSession.user.id)return;const db=getDB();db.users=db.users.filter(u=>u.id!==uid);saveDB(db);renderAdmin();showToast('User removed');}
    function changeUserPassword(uid){const newPass=prompt('New password:');if(!newPass)return;const db=getDB();const u=db.users.find(u=>u.id===uid);if(u){u.password=newPass;saveDB(db);renderAdmin();showToast('Password updated');}}

    // ==================== INIT ====================
    window.addEventListener('DOMContentLoaded', ()=>{
      loadCart(); loadSessions(); updateUI();
      initThree();
      if(adminSession) switchToAdmin(); else { currentStoreView='home'; renderStoreContent(); }
      document.getElementById('logo-home').onclick=()=>navigateStore('home');
      document.getElementById('nav-shop').onclick=()=>navigateStore('home');
      document.getElementById('nav-orders').onclick=()=>navigateStore('orders');
      document.getElementById('btn-cart-badge').onclick=openCart;
      document.getElementById('btn-close-cart').onclick=closeCart;
      document.getElementById('cart-overlay').onclick=closeCart;
      document.getElementById('btn-admin-switch').onclick=()=>{ if(adminSession)switchToAdmin(); else openAdminLogin(); };
      document.getElementById('btn-admin-logout').onclick=adminLogout;
      document.getElementById('btn-admin-to-store').onclick=switchToStore;
      document.getElementById('admin-logo-home').onclick=switchToStore;
      document.getElementById('auth-modal-overlay').addEventListener('click',function(e){if(e.target===this)closeAuth();});
      document.getElementById('generic-modal-overlay').addEventListener('click',function(e){if(e.target===this)closeGenericModal();});
      gsap.registerPlugin(ScrollTrigger);
    });
  </script>
</body>
</html>
